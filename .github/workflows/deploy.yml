name: Deploy to Deno Deploy (deployctl — legacy Projects)

# NOTE: This is only for the OLD Deno Deploy (dash.deno.com "Projects" +
# deployctl). If you use the NEW Deno Deploy (console.deno.com "Apps"), it
# builds from the repo itself — you don't need this workflow; configure the
# app's Install/Build commands + entrypoint instead (see README). Left as
# manual-dispatch only so it never auto-fails on push.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # allows Deno Deploy's OIDC auth

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build client
        run: |
          npm ci
          npm run build

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Deploys the Deno entrypoint + the built client (dist/) to production.
      # Requires repo secrets: DENO_DEPLOY_TOKEN (Deno Deploy access token) and
      # optionally DENO_PROJECT (defaults to "rifle-gg").
      - name: Deploy
        run: >
          deno run -A jsr:@deno/deployctl deploy
          --project="${DENO_PROJECT:-rifle-gg}"
          --entrypoint=server/deno.ts
          --include=server,dist
          --prod
        env:
          DENO_PROJECT: ${{ secrets.DENO_PROJECT }}
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
