<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIFLE.GG</title>
    <meta name="description" content="브라우저에서 바로 플레이하는 아레나 FPS" />
