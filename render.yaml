services:
  # RIFLE.GG — single web service: the Node server hosts the built client
  # AND the WebSocket game server on one origin. Free tier sleeps after 15min
  # idle; the first connection may take ~30s to wake it (client retries).
  - type: web
    name: rifle-gg
    runtime: node
    plan: free
    # --include=dev so vite/tsc (devDependencies) are available for the build,
    # even though Render sets NODE_ENV=production
    buildCommand: npm ci --include=dev && npm run build && npm --prefix server ci
    startCommand: node server/index.js
    healthCheckPath: /healthz
