services:
  # RIFLE.GG client — static site (practice + bot duel work fully serverless).
  - type: web
    name: rifle-gg
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # Online 1v1 game server (WebSocket). Free tier sleeps after 15min idle —
  # the first connection may take ~30s to wake it.
  - type: web
    name: rifle-gg-server
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: node index.js
